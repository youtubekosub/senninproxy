<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home - SenninProxy</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --text-color: #f1f5f9;
            --accent-color: #38bdf8;
            --secondary-text: #94a3b8;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
            color: var(--text-color);
            font-family: 'Segoe UI', 'Inter', -apple-system, sans-serif;
            overflow: hidden;
        }

        .container {
            text-align: center;
            animation: fadeIn 1s ease-out;
        }

        h1 {
            font-size: 3.2rem;
            margin: 0;
            font-weight: 700;
            letter-spacing: -1px;
            color: var(--text-color);
        }

        p {
            color: var(--secondary-text);
            font-size: 1.2rem;
            margin-top: 10px;
            letter-spacing: 1px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 装飾的な背景要素 */
        .decor {
            position: absolute;
            width: 300px;
            height: 300px;
            background: var(--accent-color);
            filter: blur(150px);
            opacity: 0.1;
            z-index: -1;
            border-radius: 50%;
        }
    </style>
</head>
<body>

    <div class="decor" style="top: -100px; left: -100px;"></div>
    <div class="decor" style="bottom: -100px; right: -100px;"></div>

    <div class="container">
        <h1>SenninProxy</h1>
        <p>上のアドレスバーから検索</p>
    </div>

</body>
</html>
